name: EVA_OS Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Compile source
        run: python -m compileall -q src
      - name: Run workspace smoke tests
        env:
          EVA_OS_ALLOW_HEAVY_SMOKE: "1"
          PYTHONPATH: src
        run: ./scripts/ciSmoke.sh
