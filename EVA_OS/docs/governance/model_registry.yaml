governance_spec_version: "1.0.0"
project_id: "EVA_OS"
assumptions:
  - assumption_id: "ASM-001"
    statement: "EVA_OS and QuantLab are research, validation, backtesting, reporting and evidence systems only; no live trading, no real orders, and no broker password storage are permitted."
    why_needed: "All scoring and gate models must preserve the safety boundary."
    scope: "EVA_OS governance baseline and current QuantLab runtime behavior"
    impact_if_violated: "Research, evidence, or business gates may be promoted beyond their verified boundary."
    validation_method: "Focused code/test inspection and governance validator; unresolved items tracked in delivery_tasks.yaml"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "EVA_OS/README.md:9"
      - "EVA_OS/AGENTS.md:9"
  - assumption_id: "ASM-002"
    statement: "Research outputs may inform real-world trading decisions, so every promoted result requires traceable data quality, cross-source validation, cost assumptions and risk gate status."
    why_needed: "Prevents unverified research artifacts from becoming decision evidence."
    scope: "EVA_OS governance baseline and current QuantLab runtime behavior"
    impact_if_violated: "Research, evidence, or business gates may be promoted beyond their verified boundary."
    validation_method: "Focused code/test inspection and governance validator; unresolved items tracked in delivery_tasks.yaml"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "EVA_OS/README.md:13"
      - "EVA_OS/README.md:134"
  - assumption_id: "ASM-003"
    statement: "Built-in strategies are approved for research use only; parameter or formula changes require report review and governance update."
    why_needed: "Strategy signals are research models, not autonomous trading permissions."
    scope: "EVA_OS governance baseline and current QuantLab runtime behavior"
    impact_if_violated: "Research, evidence, or business gates may be promoted beyond their verified boundary."
    validation_method: "Focused code/test inspection and governance validator; unresolved items tracked in delivery_tasks.yaml"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "EVA_OS/src/quantlab/strategies/profiles.py:322"
      - "EVA_OS/src/quantlab/approvals/registry.py:46"
  - assumption_id: "ASM-004"
    statement: "Only reviewed records with evidence are counted in cashflow and consumption guard totals."
    why_needed: "Business calculations must not treat unreviewed local notes as verified facts."
    scope: "EVA_OS governance baseline and current QuantLab runtime behavior"
    impact_if_violated: "Research, evidence, or business gates may be promoted beyond their verified boundary."
    validation_method: "Focused code/test inspection and governance validator; unresolved items tracked in delivery_tasks.yaml"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "EVA_OS/src/quantlab/business/cashflow.py:144"
      - "EVA_OS/src/quantlab/consumption/guard.py:144"
  - assumption_id: "ASM-005"
    statement: "Policy opportunities require reviewed authoritative evidence before Actionable status."
    why_needed: "Policy radar must avoid turning news/manual notes into compliance or subsidy conclusions."
    scope: "EVA_OS governance baseline and current QuantLab runtime behavior"
    impact_if_violated: "Research, evidence, or business gates may be promoted beyond their verified boundary."
    validation_method: "Focused code/test inspection and governance validator; unresolved items tracked in delivery_tasks.yaml"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "EVA_OS/src/quantlab/policy/radar.py:137"
      - "EVA_OS/src/quantlab/policy/radar.py:499"
  - assumption_id: "ASM-006"
    statement: "Historical Git path commits are reconstructed events only and are not counted as confirmed iterations."
    why_needed: "Governance must not invent development iteration count from commit count."
    scope: "EVA_OS governance baseline and current QuantLab runtime behavior"
    impact_if_violated: "Research, evidence, or business gates may be promoted beyond their verified boundary."
    validation_method: "Focused code/test inspection and governance validator; unresolved items tracked in delivery_tasks.yaml"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "AGENTS.md"
      - "EVA_OS/docs/governance/DEVELOPMENT_LEDGER.md"
  - assumption_id: "ASM-007"
    statement: "Provider sample data and cached hotspot rows are demonstration or derived evidence and do not prove market conclusions without fresh data checks."
    why_needed: "Hotspot and data validation gates must preserve data provenance limits."
    scope: "EVA_OS governance baseline and current QuantLab runtime behavior"
    impact_if_violated: "Research, evidence, or business gates may be promoted beyond their verified boundary."
    validation_method: "Focused code/test inspection and governance validator; unresolved items tracked in delivery_tasks.yaml"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
