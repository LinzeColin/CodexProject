governance_spec_version: "1.0.0"
root_governance:
  ci_mode: "required"
  required_files:
    - "AGENTS.md"
    - "GOVERNANCE_DASHBOARD.md"
    - "docs/governance/STANDARD.md"
    - "docs/governance/templates/MODEL_SPEC.template.md"
    - "docs/governance/templates/DEVELOPMENT_LEDGER.template.md"
    - "docs/governance/templates/DELIVERY_PLAN.template.md"
    - "docs/governance/templates/VERSION_MATRIX.template.yaml"
    - "docs/governance/templates/model_registry.template.yaml"
    - "docs/governance/templates/formula_registry.template.yaml"
    - "docs/governance/templates/parameter_registry.template.csv"
    - "docs/governance/templates/development_events.template.jsonl"
    - "docs/governance/templates/delivery_tasks.template.yaml"
    - "docs/governance/templates/TRACEABILITY_MATRIX.template.csv"
    - "docs/governance/templates/INCIDENT_RESPONSE.template.md"
    - "docs/governance/templates/OWNER_STATUS.template.md"
    - "docs/governance/CODEX_SETUP.md"
    - "governance/projects.yaml"
    - "governance/schemas/model_registry.schema.json"
    - "governance/schemas/formula_registry.schema.json"
    - "governance/schemas/delivery_tasks.schema.json"
    - "governance/schemas/incident_response.schema.json"
    - "governance/schemas/ci_attestation.schema.json"
    - "scripts/validate_project_governance.py"
    - "scripts/validate_governance_sync.py"
    - "scripts/validate_semantic_extractors.py"
    - "scripts/validate_ci_attestation.py"
    - "scripts/governance_setup_doctor.py"
    - "scripts/generate_governance_dashboard.py"
    - "tests/governance/test_project_governance_validator.py"
    - ".github/workflows/project-governance.yml"
    - ".agents/skills/project-governance/SKILL.md"
    - ".agents/skills/codex-dex/SKILL.md"
    - ".codex/config.template.toml"
    - ".codex/hooks.json"
    - ".codex/hooks/governance_stop.py"
project_governance_files:
  - "docs/governance/MODEL_SPEC.md"
  - "docs/governance/model_registry.yaml"
  - "docs/governance/formula_registry.yaml"
  - "docs/governance/parameter_registry.csv"
  - "docs/governance/DEVELOPMENT_LEDGER.md"
  - "docs/governance/development_events.jsonl"
  - "docs/governance/DELIVERY_PLAN.md"
  - "docs/governance/delivery_tasks.yaml"
  - "docs/governance/VERSION_MATRIX.yaml"
  - "docs/governance/TRACEABILITY_MATRIX.csv"
  - "docs/governance/STATUS.md"
  - "docs/governance/OWNER_STATUS.md"
  - "VERSION"
  - "CHANGELOG.md"
projects:
  - project_id: "Alpha"
    path: "Alpha"
    ci_mode: "required"
    status: "existing"
    semantic_coverage:
      status: "planned"
      task_id: "GOV-SEMANTIC-ALPHA-001"
      acceptance_id: "ACC-SEMANTIC-ALPHA-001"
      target: "Add machine source selectors for active parameters and implementation fingerprints for active formulas."
      evidence_ref: "Alpha/docs/governance/OWNER_STATUS.md"
      owner: "project owner"
      rationale: "Review6-D rollout guard; semantic extractors are not yet implemented for Alpha."
    model_behavior_globs:
      - "backend/**/*.py"
      - "configs/**/*.yaml"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "README.md"
  - project_id: "EEI"
    path: "EEI"
    ci_mode: "required"
    status: "existing"
    semantic_extractors: true
    semantic_coverage:
      status: "in_progress"
      task_id: "GOV-SEMANTIC-EEI-001"
      acceptance_id: "ACC-SEMANTIC-EEI-001"
      target: "Bind EEI active parameter_catalog and model/formula registries to machine extractors without changing runtime behavior."
      evidence_ref: "governance/run_manifests/GOV-SEMANTIC-EEI-EXTRACT-001.json"
      owner: "project owner"
      rationale: "EEI now has partial machine semantic extraction for 54 active parameters and 10 active formulas; 7 UNKNOWN motion parameters and FORM-012 remain task-bound."
    model_behavior_globs:
      - "apps/**"
      - "packages/**"
      - "models/**"
      - "data/model_registry.csv"
      - "data/formula_registry.csv"
      - "data/parameter_catalog.csv"
      - "package.json"
      - "pyproject.toml"
      - "README.md"
  - project_id: "EVA_OS"
    path: "EVA_OS"
    ci_mode: "required"
    status: "existing"
    semantic_coverage:
      status: "planned"
      task_id: "GOV-SEMANTIC-EVA-001"
      acceptance_id: "ACC-SEMANTIC-EVA-001"
      target: "Add machine selectors for strategy parameters and fingerprints for active strategy formulas."
      evidence_ref: "EVA_OS/docs/governance/OWNER_STATUS.md"
      owner: "project owner"
      rationale: "Review6-D rollout guard; semantic extractors are not yet implemented for EVA_OS."
    model_behavior_globs:
      - "src/**"
      - "systems/**"
      - "scripts/**"
      - "tests/**"
