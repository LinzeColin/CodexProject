governance_spec_version: "1.0.0"
project_id: "OpenAIDatabase"
assumptions:
  - assumption_id: "ASM-001"
    statement: "OpenAIDatabase is local-first and review-gated; raw exports, plaintext secrets, cookies, sessions, browser profiles, and saved-memory writes are outside allowed repository behavior."
    fact_level: "EXTRACTED"
    evidence_refs: ["OpenAIDatabase/AGENTS.md:5", "OpenAIDatabase/AGENTS.md:9", "OpenAIDatabase/README.md:13"]
  - assumption_id: "ASM-002"
    statement: "Current memory extraction, scoring, retrieval, activity, and writeback behavior is deterministic Python or TypeScript logic; no repository evidence shows trained ML weights or experimental calibration."
    fact_level: "EXTRACTED"
    evidence_refs: ["OpenAIDatabase/skills/openai-memory-analysis/scripts/openai_memory_analysis.py:512", "OpenAIDatabase/scripts/build_memory_atlas_data.py:380", "OpenAIDatabase/apps/memory-atlas/src/App.tsx:2328"]
  - assumption_id: "ASM-003"
    statement: "The public Memory Atlas snapshot is a redacted read-only visualization contract; the frontend cannot mutate active memory directly."
    fact_level: "EXTRACTED"
    evidence_refs: ["OpenAIDatabase/README.md:118", "OpenAIDatabase/scripts/build_memory_atlas_data.py:1227", "OpenAIDatabase/scripts/audit_memory_atlas_release.py:132"]
  - assumption_id: "ASM-004"
    statement: "Codex local data sync may read real local session logs only to emit redacted summaries without raw transcript text, local absolute paths, or plaintext secrets."
    fact_level: "EXTRACTED"
    evidence_refs: ["OpenAIDatabase/AGENTS.md:38", "OpenAIDatabase/scripts/sync_codex_memory_data.py:2", "OpenAIDatabase/tests/test_codex_memory_sync.py:43"]
  - assumption_id: "ASM-005"
    statement: "Future data sources must be registry-first and must not create fake nodes or activity while planned-only."
    fact_level: "EXTRACTED"
    evidence_refs: ["OpenAIDatabase/config/data_sources/source_registry.json:1", "OpenAIDatabase/scripts/audit_memory_atlas_acceptance.py:86", "OpenAIDatabase/AGENTS.md:35"]
  - assumption_id: "ASM-006"
    statement: "The repository does not provide evidence that heuristic weights and thresholds were calibrated against labeled datasets or out-of-sample experiments."
    fact_level: "UNKNOWN"
    unknown_task_ids: ["TASK-OAI-B-001"]
    evidence_refs: ["OpenAIDatabase/docs/MEMORY_ATLAS_PROJECT_MODEL_PARAMETERS.md:20", "OpenAIDatabase/docs/MEMORY_ATLAS_PROJECT_MODEL_PARAMETERS.md:56"]
