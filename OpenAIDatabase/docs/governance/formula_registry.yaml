    constraints: ["Planned platform sources must not generate fake nodes/activity.", "Public snapshot excludes raw source references and sensitive fields."]
    missing_policy: "Invalid registry schema or sources list returns empty registry summary and acceptance fails."
    output_range: "data source summary list; acceptance pass or failure reason."
    code_refs: ["OpenAIDatabase/scripts/build_memory_atlas_data.py:156", "OpenAIDatabase/scripts/build_memory_atlas_data.py:1208", "OpenAIDatabase/scripts/audit_memory_atlas_acceptance.py:86", "OpenAIDatabase/scripts/build_memory_atlas_data.py:271"]
    test_refs: ["OpenAIDatabase/tests/test_memory_atlas_data.py:25", "OpenAIDatabase/tests/test_memory_atlas_acceptance_audit.py"]
