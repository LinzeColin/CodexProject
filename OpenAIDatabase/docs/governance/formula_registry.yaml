      - name: "categories"
        data_type: "list[string]"
        unit: "matched trigger names"
        input_domain: "subset of TRIGGER_PATTERNS keys"
      - name: "trigger_count"
        data_type: "integer"
        unit: "count"
        input_domain: ">=0"
      - name: "statement"
        data_type: "string"
        unit: "redacted text"
        input_domain: "normalized length >= 8 after filters"
      - name: "evidence_count"
        data_type: "integer"
        unit: "count"
        input_domain: ">=1 for emitted candidates"
