        data_type: "integer"
        unit: "messages"
        input_domain: ">=0"
      - name: "tool_call_count"
        data_type: "integer"
        unit: "calls"
        input_domain: ">=0"
      - name: "topic_labels"
        data_type: "list[object]"
        unit: "matched topic labels"
        input_domain: "subset of TOPIC_RULES"
    constraints: ["Raw transcript, absolute local paths, plaintext secrets, cookies, and session files are not committed.", "Preference recommendations are derived from redacted summaries."]
    missing_policy: "Unreadable JSONL rows are skipped; missing date/session metadata becomes empty or hashed labels."
    output_range: "session activity_score >= 0; activity_level 0..5."
    code_refs: ["OpenAIDatabase/scripts/sync_codex_memory_data.py:43", "OpenAIDatabase/scripts/sync_codex_memory_data.py:54", "OpenAIDatabase/scripts/sync_codex_memory_data.py:279", "OpenAIDatabase/scripts/sync_codex_memory_data.py:334"]
    test_refs: ["OpenAIDatabase/tests/test_codex_memory_sync.py:20"]
