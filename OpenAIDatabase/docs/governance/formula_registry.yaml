  - formula_id: "FORM-009"
    model_id: "MOD-009"
    assumption_ids: ["ASM-003", "ASM-005"]
    status: "active"
    expression: "load_data_source_registry returns {} unless schema_version == memory_atlas_data_source_registry.v1 and sources is a list. registry_source_map keeps sources with non-empty id. Acceptance requires sources memory_atlas and codex active; wechat, xiaohongshu, douyin planned; canonical required fields include source_id, record_id, occurred_at, record_type, summary, sensitivity, dedupe_key; homepage data_sources exactly all, memory_atlas, codex with labels 总数据源, ChatGPT, Codex; planned sources must remain registry-only and ingestion_status planned_no_real_data. Static summaries redact private/sensitive/source details before public snapshot."
