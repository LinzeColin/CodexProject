  - formula_id: "FORM-010"
    model_id: "MOD-010"
    assumption_ids: ["ASM-001", "ASM-003"]
    status: "active"
    expression: "saveProposal requires editable and non-empty draft text. proposal_id = atlas_<compactTimestamp(now)>_<stableHash(node.id:text:nodeProposalCount+1)>; status = draft_pending_agent_apply; revision = latest.revision + 1 or 1; parent_proposal_id = latest proposal id or null; rollback_unit = policy.rollback_unit or per_memory_version; safety direct_frontend_mutation_of_active_memory=false, requires_conflict_check=true, requires_agent_or_human_apply=true, forbidden_payload from policy or plaintext secrets/raw conversation text/record hashes/local absolute paths. createRollbackProposal uses latest and previous/target, action rollback_to_version, revision latest+1, parent latest, supersedes latest, rollback_to_proposal_id target, and rollback_to_revision target revision."
    variables:
