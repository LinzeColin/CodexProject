formulas:
  -
    formula_id: "FORM-001"
    model_id: "MOD-001"
    status: "active"
    fact_level: "EXTRACTED"
    semantic_status: "MACHINE_VERIFIED"
    expression: "candidate = None if no trigger match or normalized statement length < 8. Else classify_chunk uses priority temporary_or_sensitive unless temp_is_rule, deprecated_info, security_boundary, decision, answering_rule, workflow, project_context, preference, else fact. Importance maps security_boundary/decision/answering_rule to 高, workflow/project_context/preference/deprecated_info to 中, else 低. Validity maps temporary_or_sensitive to 临时, project_context to 项目结束前, workflow/preference to 半年, else 长期. Confidence is high if trigger_count >= 3 or importance == 高, medium if trigger_count >= 1, else low. assign_memory_tier returns 临时 for sensitive/secret or 临时 validity, 核心画像 for preference/answering_rule/core profile regex, 一般 for decision/project_context/workflow/security_boundary or long/project/half-year validity, else 临时. merge key is category + normalized statement; evidence is capped at 10; medium confidence promotes to high after evidence_count >= 3."
    code_refs:
