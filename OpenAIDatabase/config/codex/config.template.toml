# OpenAIDatabase personalization manifest.
# This is not a Codex runtime config and must not be copied verbatim to
# ~/.codex/config.toml. The project runtime config is .codex/config.toml.

[codex_user_config_template]
schema_version = "openai_database.codex_user_config_template.v1"
manifest_kind = "user_personalization_manifest"
purpose = "Template for a user's local Codex configuration when using OpenAIDatabase as durable personalization memory."
default_language = "zh-CN"
canonical_repo = "LinzeColin/CodexProject/OpenAIDatabase"
startup_route = "startup"
personalization_export = "data/derived/personalization/codex_personalization.md"
agent_context_pack = "data/derived/agent_context/agent_context_pack.json"
resource_routes = "config/context_sources/resource_routes.json"
three_layer_context = "config/context_sources/three_layer_context.json"

[privacy]
commit_raw_exports = false
commit_plaintext_secrets = false
commit_browser_state = false
use_secret_ref_only = true

[sync]
required_update_targets = ["profile", "preference", "taste", "history", "pattern"]
required_log_categories = ["sync_runs", "export_runs", "evaluation_runs", "agent_runs"]
after_memory_sync_commands = [
  "python3 scripts/build_agent_context_pack.py --database-dir .",
  "python3 scripts/build_personalization_exports.py --database-dir .",
  "python3 scripts/evaluate_personalization_context.py --database-dir ."
]

[routing]
startup = ["AGENTS.md", "data/derived/personalization/codex_personalization.md"]
profile = ["data/derived/profile/CORE_PROFILE.md", "data/derived/personalization/chatgpt_personalization.md"]
history = ["data/derived/timeline/TIMELINE.md", "data/processed/codex/codex_activity_snapshot.json"]
