schema_version: memory_river_params.v1
product_target: Memory Atlas v1.1.5
stage: "5.2"
task: "5.2 Memory River Interaction"
status: production_phase_5_2_heuristic
last_updated: "2026-07-01"
data_boundary:
  allowed_inputs:
    - data/derived/visualization/memory_atlas.json
    - redacted derived Universe State Snapshot
  raw_private_data_allowed: false
  plaintext_secrets_allowed: false
  local_absolute_paths_allowed: false
  writeback_allowed: false
notes:
  purpose: "Production Stage 5.2 parameters for Timeline renderer flag, UTC day scale, Macro/Meso/Micro Memory River lanes, pan, brush, event card, and safe feedback."
  calibration_status: "heuristic layout and interaction constants; source-level and browser-smoke validated, not empirically calibrated"
  rollback: "Set timelineRenderer=legacy, timeline=legacy, VITE_MEMORY_ATLAS_TIMELINE_RENDERER=legacy, or localStorage memory-atlas.timeline-renderer=legacy."
time:
  use_utc_scale: true
  date_parse_contract: "YYYY-MM-DD is parsed as Date.UTC(year, month, day)"
  x_min: 80
  x_max: 960
  svg_viewbox: "0 0 1000 640"
  visible_event_cap: 260
  density_band_count: 48
  density_backdrop_count: 36
lanes:
  renderer_default: memory-river
  legacy_renderer: legacy
  levels:
    macro:
      label: Macro
      grouping: memory_tier
      max_lanes: 3
      base_y: 118
    meso:
      label: Meso
      grouping: theme_or_project_cluster
      max_lanes: 4
      base_y: 294
    micro:
      label: Micro
      grouping: memory_category
      max_lanes: 4
      base_y: 464
  lane_sort:
    - descending_event_count
    - descending_memory_river_event_score
    - zh_cn_label
visual:
  river_curve: cubic_midpoint
  river_wave_jitter_px: 38
  lane_stroke_width_min: 8
  lane_stroke_width_max: 34
  lane_stroke_log_count_multiplier: 9
  lane_stroke_score_multiplier: 0.03
  black_hole_marker_categories:
    - deprecated_info
    - temporary_or_sensitive
  proto_star_marker_categories:
    - decision
  marker_cap: 64
scoring:
  importance_high: 12
  importance_medium: 6
  importance_low: 2
  decision_bonus: 8
  core_memory_tier_bonus: 8
  general_memory_tier_bonus: 4
interaction:
  renderer_toggle_enabled: true
  legacy_rollback_enabled: true
  wheel_zoom_inherited_from_legacy_timeline: true
  playback_cursor_inherited_from_legacy_timeline: true
  pan_enabled: true
  pointer_pan_mode: pan
  brush_enabled: true
  brush_mode: brush
  brush_min_width_px: 14
  selected_range_sync_targets:
    - Interaction Lens
    - Home Overview heading
    - Galaxy heading
  hover_card_delay_ms: 0
  click_event_card_enabled: true
  event_card_payload: redacted_derived_event_only
  event_card_syncs_inspector: true
feedback:
  reduced_motion_default_from_media_query: true
  reduced_motion_stops_playback: true
  reduced_motion_suppresses_feedback: true
  pseudo_haptic_enabled: optional_user_enabled
  pseudo_haptic_default: false
  audio_feedback_default: false
  vibration_default: false
  audio_feedback_max_gain: 0.018
  audio_feedback_max_duration_ms: 55
validation_hints:
  required_sections:
    - time
    - lanes
    - visual
    - interaction
    - feedback
  required_interactions:
    - renderer toggle
    - legacy rollback
    - UTC scale
    - Macro lane
    - Meso lane
    - Micro lane
    - pan mode
    - brush range
    - selected time range sync
    - hover event card
    - click event lock
    - black hole marker
    - proto-star marker
    - reduced motion setting
    - default no audio
    - default no vibration
  non_goals:
    - no Stage 5.3 evidence layers in Phase 5.2
    - no Stage 5 whole-stage review in Phase 5.2
    - no raw transcript access
    - no writeback
