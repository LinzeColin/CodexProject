<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Starfield Spike</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #03050a;
        color: #eef6ff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle at 50% 45%, #121a2e 0%, #050812 44%, #020309 100%);
      }

      #app {
        position: fixed;
        inset: 0;
      }

      .hud {
        position: fixed;
        left: 18px;
        top: 18px;
        z-index: 4;
        display: grid;
        gap: 10px;
        width: min(360px, calc(100vw - 36px));
        pointer-events: none;
      }

      .hud-panel,
      .hover-card {
        border: 1px solid rgba(155, 209, 255, 0.22);
        background: rgba(4, 9, 18, 0.72);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(14px);
      }

      .hud-panel {
        padding: 12px 14px;
      }

      .eyebrow {
        margin: 0 0 4px;
        font-size: 11px;
        color: #8fd3ff;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-top: 10px;
      }

      .metric {
        padding: 7px 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
      }

      .metric span {
        display: block;
        font-size: 10px;
        color: #9fb2c9;
      }

      .metric strong {
        display: block;
        margin-top: 2px;
        font-size: 14px;
      }

      .controls {
        position: fixed;
        right: 18px;
        top: 18px;
        z-index: 4;
        display: grid;
        gap: 8px;
        width: min(270px, calc(100vw - 36px));
        padding: 12px;
        border: 1px solid rgba(155, 209, 255, 0.2);
        background: rgba(4, 9, 18, 0.68);
        backdrop-filter: blur(14px);
      }

      .controls label {
        display: grid;
        gap: 5px;
        font-size: 12px;
        color: #dcecff;
      }

      .controls select,
      .controls input {
        accent-color: #8fd3ff;
      }

      .hover-card {
        position: fixed;
        z-index: 5;
        right: 18px;
        bottom: 18px;
        width: min(360px, calc(100vw - 36px));
        min-height: 118px;
        padding: 14px;
      }

      .hover-card[data-empty="true"] {
        opacity: 0.58;
      }

      .hover-card h2 {
        margin: 0 0 6px;
        font-size: 15px;
        letter-spacing: 0;
      }

      .hover-card p {
        margin: 0;
        color: #c4d6e8;
        font-size: 13px;
        line-height: 1.5;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .pill {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        font-size: 11px;
        color: #cfe6ff;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--dot);
      }

      @media (max-width: 720px) {
        .controls {
          left: 18px;
          right: auto;
          top: auto;
          bottom: 18px;
        }

        .hover-card {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" aria-label="Memory Starfield Spike"></main>
    <section class="hud" aria-label="Spike status">
      <div class="hud-panel">
        <p class="eyebrow">Memory Atlas v1.1.5 · isolated C3 spike</p>
        <h1>记忆星系 WebGL 粒子流场</h1>
        <div class="metrics">
          <div class="metric"><span>Particles</span><strong id="particleCount">0</strong></div>
          <div class="metric"><span>FPS</span><strong id="fpsReadout">0</strong></div>
          <div class="metric"><span>Quality</span><strong id="qualityReadout">high</strong></div>
        </div>
        <div class="legend" aria-label="Legend">
          <span class="pill"><span class="dot" style="--dot: #8fd3ff"></span>Dominant</span>
          <span class="pill"><span class="dot" style="--dot: #f7cf6b"></span>Rising</span>
          <span class="pill"><span class="dot" style="--dot: #111827"></span>Black Hole</span>
          <span class="pill"><span class="dot" style="--dot: #ffef9a"></span>Proto-Star</span>
        </div>
      </div>
    </section>
    <section class="controls" aria-label="Spike controls">
      <label>
        Quality / LOD
        <select id="qualityControl">
          <option value="high">High · 12000 particles</option>
          <option value="mid" selected>Mid · 10000 particles</option>
          <option value="low">Low · 8000 particles</option>
        </select>
      </label>
      <label>
        Flow Field
        <input id="flowControl" type="range" min="0" max="1.4" step="0.05" value="1" />
      </label>
      <label>
        Reduced motion
        <input id="reducedMotionControl" type="checkbox" />
      </label>
    </section>
    <aside class="hover-card" id="hoverCard" data-empty="true" aria-live="polite">
      <h2>Hover cluster</h2>
      <p>聚焦星团可查看 redacted 摘要、confidence 和 evidence count。Spike 不读取 raw/private 数据。</p>
    </aside>
    <pre id="smokeStatus" hidden>{}</pre>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
