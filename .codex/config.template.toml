#:schema https://developers.openai.com/codex/config-schema.json

personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
project_doc_max_bytes = 65536

developer_instructions = """
For non-trivial software development, first read all active AGENTS.md files.
Use $codex-dex for implementation, refactoring, model changes, releases, and multi-file fixes.
Start with a bounded plan/read-only pass.
Do not declare completion until repository governance validation and focused tests pass.
Repository AGENTS.md and actual code, configuration, tests, and generated evidence are the source of truth.
"""

[features]
hooks = true
