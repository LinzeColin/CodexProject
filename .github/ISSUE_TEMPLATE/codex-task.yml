name: Codex Task Pack
description: Create an approved dual-plane Task Pack issue for Agent Loop.
title: "[Agent Loop] "
labels: ["agent:run", "source:chatgpt-approved"]
body:
  - type: markdown
    attributes:
      value: |
        Paste the full Owner-approved dual-plane Task Pack below.

        Requirements:
        - It must include the `<!-- AGENT_LOOP_METADATA ... END_AGENT_LOOP_METADATA -->` wrapper.
        - ChatGPT should include `project`, `risk_tier`, `allowed_paths`, `forbidden_paths`, and `validation_commands`.
        - If routing fields are incomplete, Agent Loop will autofill only when the project is unambiguous; otherwise it blocks safely.
        - Do not choose project or risk manually in this form; workflow routing reads the Task Pack and routing matrix.
        - Labels are convenience only. If GitHub does not apply them, the workflow still starts for trusted issue authors and adds missing labels itself.
  - type: textarea
    id: taskpack
    attributes:
      label: Approved dual-plane Task Pack
      description: Paste the complete Task Pack generated by ChatGPT and approved by the Owner.
      placeholder: |
        <!-- AGENT_LOOP_METADATA
        {
          "agent_loop_version": "1.0",
          "source": "chatgpt-approved",
          "repository": "LinzeColin/CodexProject",
          "risk_tier": "T1",
          "auto_merge": true,
          "plan_required": false,
          "production_deploy": false,
          "project": "agent-loop",
          "roadmap_task_id": "TASK-ID",
          "acceptance_id": "ACCEPTANCE-ID",
          "allowed_paths": ["docs/governance/agent_loop/**"],
          "forbidden_paths": ["AGENTS.md"],
          "validation_commands": ["python3 -m py_compile scripts/agent_loop/*.py"],
          "max_autofix_loops": 1
        }
        END_AGENT_LOOP_METADATA -->

        # Task Pack: Title

        ## Human Summary
        ...
    validations:
      required: true
