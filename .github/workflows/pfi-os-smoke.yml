name: PFI_OS Smoke

on:
  pull_request:
    paths:
      - "PFI_OS/**"
      - ".github/workflows/pfi-os-smoke.yml"
  workflow_dispatch:

jobs:
  pfi-os-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: PFI_OS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install shell runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
      - name: Install locked package and test dependencies
        run: |
          python -m pip install -r requirements.lock
          python -m pip install --no-deps -e .
      - name: Run PFI target gate
        env:
          PFI_PYTHON: python
          PYTHONPATH: src
        run: ./scripts/pfiGate.sh target
      - name: Prove injected failure is blocked
        env:
          PFI_PYTHON: python
        run: ./scripts/pfiCiInjectedFailureProof.sh
