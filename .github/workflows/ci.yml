name: ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/memory-atlas/package-lock.json
      - name: Compile
        run: python -m py_compile skills/openai-memory-analysis/scripts/openai_memory_analysis.py scripts/build_memory_atlas_data.py scripts/build_agent_context_pack.py scripts/sync_codex_memory_data.py scripts/install_codex_weekly_sync.py scripts/audit_memory_atlas_release.py scripts/audit_memory_atlas_visual_acceptance.py scripts/audit_memory_atlas_acceptance.py scripts/audit_memory_atlas_goal_completion.py scripts/deploy_memory_atlas_cloudflare.py scripts/preflight_cloudflare_pages_access.py scripts/install_memory_atlas_app.py
      - name: Self test
        run: python skills/openai-memory-analysis/scripts/openai_memory_analysis.py self-test --out-dir /tmp/openai-memory-analysis-self-test
      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Build Memory Atlas data
        run: python scripts/build_memory_atlas_data.py --database-dir . --output data/derived/visualization/memory_atlas.json
      - name: Build Agent Context Pack
        run: python scripts/build_agent_context_pack.py --database-dir .
      - name: Install Memory Atlas dependencies
        run: npm ci --prefix apps/memory-atlas
      - name: Build Memory Atlas frontend
        run: npm run build --prefix apps/memory-atlas
      - name: Audit Memory Atlas release output
        run: python scripts/audit_memory_atlas_release.py --publish-dir apps/memory-atlas/dist
      - name: Audit Memory Atlas visual acceptance
        run: python scripts/audit_memory_atlas_visual_acceptance.py
      - name: Audit Memory Atlas acceptance
        run: python scripts/audit_memory_atlas_acceptance.py --publish-dir apps/memory-atlas/dist
      - name: Audit Memory Atlas goal completion state
        run: python scripts/audit_memory_atlas_goal_completion.py --publish-dir apps/memory-atlas/dist
      - name: Preflight Cloudflare Pages + Access
        run: python scripts/preflight_cloudflare_pages_access.py --publish-dir apps/memory-atlas/dist
