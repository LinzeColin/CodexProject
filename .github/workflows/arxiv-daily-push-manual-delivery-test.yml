name: arXiv Daily Push manual B1 text SMTP test

on:
  workflow_dispatch:
    inputs:
      confirm_manual_delivery_test:
        description: "Type SEND_TEST_EMAIL_TO_LINZEZHANG35_GMAIL_COM to send one Gmail SMTP Stage 1 text test email."
        required: true
        type: string
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string
      max_results_per_category:
        description: "Small live arXiv fetch window per primary archive."
        required: true
        default: "1"
        type: choice
        options: ["1", "2", "3"]

permissions:
  actions: read
  contents: read

concurrency:
  group: arxiv-daily-push-manual-b1-text-smtp-test
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - name: Resolve manual test guard
        id: guard
        shell: bash
        run: |
          should_run="false"
          if [ "${{ inputs.confirm_manual_delivery_test }}" = "SEND_TEST_EMAIL_TO_LINZEZHANG35_GMAIL_COM" ]; then
            should_run="true"
          fi
          printf 'should_run=%s\n' "$should_run" >> "$GITHUB_OUTPUT"
          {
            echo "## arXiv Daily Push manual B1 text SMTP test"
            echo "- status: $should_run"
            echo "- runner: ubuntu-latest"
            echo "- recipient: linzezhang35@gmail.com"
            echo "- production schedule: not enabled"
            echo "- video delivery: not required for Stage 1"
          } >> "$GITHUB_STEP_SUMMARY"

  manual-delivery-test:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ADP_PRODUCTION_ENABLED: "false"
      ADP_SCHEDULED_RUN_ENABLED: "true"
      ADP_ALLOW_SMTP_SEND: "true"
      ADP_SMTP_HOST: ${{ secrets.ADP_SMTP_HOST || 'smtp.gmail.com' }}
      ADP_SMTP_PORT: ${{ secrets.ADP_SMTP_PORT || '587' }}
      ADP_SMTP_USERNAME: ${{ secrets.ADP_SMTP_USERNAME || 'linzezhang35@gmail.com' }}
      ADP_SMTP_PASSWORD: ${{ secrets.ADP_SMTP_PASSWORD }}
      ADP_ARXIV_POLITE_DELAY_SECONDS: "3"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Stop unless default branch
        shell: bash
        run: |
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "manual delivery test must run from the default branch after PR CI and merge"
            exit 2
          fi
      - name: Resolve generated_at
        id: generated_at
        shell: bash
        run: |
          if [ -n "${{ inputs.generated_at }}" ]; then value="${{ inputs.generated_at }}"; else value="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; fi
          printf 'value=%s\n' "$value" >> "$GITHUB_OUTPUT"
          printf 'date=%s\n' "${value:0:10}" >> "$GITHUB_OUTPUT"
      - name: Run production preflight for manual test
        id: preflight
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-manual-delivery-preflight.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_manual_delivery_preflight" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push preflight-production --path . --generated-at "${{ steps.generated_at.outputs.value }}" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload manual preflight evidence
        if: always() && steps.preflight.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: adp-manual-delivery-preflight
          path: ${{ steps.preflight.outputs.path }}
          if-no-files-found: error
      - name: Build all-arXiv Stage 1 text input
        id: daily_input
        shell: bash
        run: |
          artifact_dir="$RUNNER_TEMP/adp-phase12-delivery-artifacts"
          report="$RUNNER_TEMP/adp-manual-delivery-daily-input.json"
          queue="$RUNNER_TEMP/adp-candidate-queue.json"
          mkdir -p "$artifact_dir"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_manual_delivery_input" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push build-all-arxiv-daily-input --date "${{ steps.generated_at.outputs.date }}" --generated-at "${{ steps.generated_at.outputs.value }}" --max-results-per-category "${{ inputs.max_results_per_category }}" --polite-delay-seconds "${ADP_ARXIV_POLITE_DELAY_SECONDS}" --artifact-dir "$artifact_dir" --queue-output "$queue" --json > "$report"
          printf 'report=%s\n' "$report" >> "$GITHUB_OUTPUT"
          printf 'artifact_dir=%s\n' "$artifact_dir" >> "$GITHUB_OUTPUT"
          printf 'queue=%s\n' "$queue" >> "$GITHUB_OUTPUT"
      - name: Verify Stage 1 text artifacts
        shell: bash
        run: |
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-daily-input.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-candidate-queue.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-text-delivery-policy.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-email-brief.json"
      - name: Upload Stage 1 text artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adp-phase12-delivery-artifacts
          path: |
            ${{ steps.daily_input.outputs.report }}
            ${{ steps.daily_input.outputs.artifact_dir }}
            ${{ steps.daily_input.outputs.queue }}
          if-no-files-found: error
      - name: Run scheduled production driver for manual SMTP test
        id: scheduled
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-manual-delivery-scheduled-execution.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_manual_delivery_scheduled" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push run-scheduled-production --mode daily-run --generated-at "${{ steps.generated_at.outputs.value }}" --preflight-report "${{ steps.preflight.outputs.path }}" --daily-input "${{ steps.daily_input.outputs.report }}" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload manual scheduled execution evidence
        if: always() && steps.scheduled.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: adp-manual-delivery-scheduled-execution
          path: ${{ steps.scheduled.outputs.path }}
          if-no-files-found: error
