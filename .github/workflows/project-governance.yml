name: Project Governance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      scope:
        description: "Governance validation scope"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - changed-only
          - project
          - information-quality
      project:
        description: "Project id or path when scope=project"
        required: false
        type: string
      base_ref:
        description: "Optional base commit/ref for scope=changed-only"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: project-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run governance validator tests
        run: |
          if python3 -c "import pytest" >/dev/null 2>&1; then
            python3 -m pytest tests/governance -q
          else
            python3 -m unittest discover -s tests/governance -p 'test_*.py' -q
          fi
      - name: Validate changed governance scope
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'changed-only')
        env:
          GOVERNANCE_BASE_REF: ${{ inputs.base_ref || '' }}
        run: python3 scripts/validate_project_governance.py --changed-only --enforce-sync --semantic
      - name: Validate information quality
        if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'information-quality')
        run: python3 scripts/validate_information_quality.py --all --fast --fail-on-error
      - name: Validate pushed governance diff
        if: github.event_name == 'push'
        env:
          GOVERNANCE_BASE_REF: ${{ github.event.before }}
        run: python3 scripts/validate_project_governance.py --changed-only --enforce-sync --semantic --base-ref "${GOVERNANCE_BASE_REF}"
      - name: Validate all registered scopes
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.scope == 'all')
        run: python3 scripts/validate_project_governance.py --all --semantic --drift-report
      - name: Validate selected project
        if: github.event_name == 'workflow_dispatch' && inputs.scope == 'project'
        run: |
          if [ -z "${{ inputs.project }}" ]; then
            echo "project input is required when scope=project"
            exit 1
          fi
          python3 scripts/validate_project_governance.py --project "${{ inputs.project }}" --semantic
      - name: Verify generated governance dashboard
        run: |
          python3 scripts/generate_governance_dashboard.py --write
          git diff --exit-code -- README.md GOVERNANCE_DASHBOARD.md OWNER_PORTFOLIO.md governance/binding_backlog.yaml ':(glob)**/docs/governance/ASSURANCE_STATUS.yaml' ':(glob)**/docs/governance/STATUS.md' ':(glob)**/docs/governance/OWNER_STATUS.md'
      - name: Write CI attestation
        if: success()
        env:
          GOVERNANCE_ATTESTATION_BASE_REF: ${{ github.event.before || github.event.pull_request.base.sha || '' }}
          GOVERNANCE_ATTESTATION_ARTIFACT: project-governance-ci-attestation-${{ github.run_id }}-${{ github.run_attempt }}
          GOVERNANCE_ATTESTATION_DIR: ${{ runner.temp }}/governance-ci-attestation
        run: |
          mkdir -p "${GOVERNANCE_ATTESTATION_DIR}"
          python3 scripts/validate_ci_attestation.py write \
            --run-id "GITHUB-${{ github.run_id }}-${{ github.run_attempt }}" \
            --workflow "Project Governance" \
            --run-id-number "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --commit-sha "${{ github.sha }}" \
            --base-ref "${GOVERNANCE_ATTESTATION_BASE_REF}" \
            --artifact-ref "github-actions-artifact:${GOVERNANCE_ATTESTATION_ARTIFACT}" \
            --conclusion success \
            --output "${GOVERNANCE_ATTESTATION_DIR}/governance-ci-attestation.json"
          python3 scripts/validate_ci_attestation.py validate --file "${GOVERNANCE_ATTESTATION_DIR}/governance-ci-attestation.json"
          python3 scripts/governance_setup_doctor.py --json --check-github > "${GOVERNANCE_ATTESTATION_DIR}/governance-setup-doctor.json"
      - name: Upload CI attestation artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: project-governance-ci-attestation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/governance-ci-attestation/*.json
          if-no-files-found: error
          retention-days: 30
      - name: Write governance summary
        if: always()
        run: |
          {
            echo "## Project Governance"
            echo "- event: ${{ github.event_name }}"
            echo "- scope: ${{ inputs.scope || 'auto' }}"
            echo "- project: ${{ inputs.project || 'not_applicable' }}"
            echo "- required failures are not masked by continue-on-error"
          } >> "$GITHUB_STEP_SUMMARY"
