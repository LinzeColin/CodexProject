name: arXiv Daily Push scheduled production gate

on:
  schedule:
    - cron: "45 4 * * *"
      timezone: "Australia/Sydney"
    - cron: "0 5 * * *"
      timezone: "Australia/Sydney"
    - cron: "10 5 * * *"
      timezone: "Australia/Sydney"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scheduled mode to probe."
        required: true
        default: "health-check"
        type: choice
        options:
          - "health-check"
          - "daily-run"
          - "watchdog"
      confirm_scheduled_production:
        description: "Set true only after runner, SMTP, Release, schedule, and resource prerequisites are provisioned."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-scheduled-production
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.value }}
      should_run: ${{ steps.mode.outputs.should_run }}
    steps:
      - name: Resolve scheduled mode
        id: mode
        shell: bash
        run: |
          mode="${{ inputs.mode }}"
          should_run="false"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "45 4 * * *") mode="health-check" ;;
              "0 5 * * *") mode="daily-run" ;;
              "10 5 * * *") mode="watchdog" ;;
              *) mode="unknown" ;;
            esac
            if [ "${{ vars.ADP_PRODUCTION_ENABLED }}" = "true" ]; then
              should_run="true"
            fi
          elif [ "${{ inputs.confirm_scheduled_production }}" = "true" ]; then
            should_run="true"
          fi
          printf 'value=%s\n' "$mode" >> "$GITHUB_OUTPUT"
          printf 'should_run=%s\n' "$should_run" >> "$GITHUB_OUTPUT"
          {
            echo "## arXiv Daily Push scheduled gate"
            echo "- event: ${{ github.event_name }}"
            echo "- schedule: ${{ github.event.schedule || 'manual' }}"
            echo "- mode: $mode"
            echo "- should_run: $should_run"
            echo "- production_enabled: ${{ vars.ADP_PRODUCTION_ENABLED || 'false' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  preflight:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on:
      - self-hosted
      - arxiv-daily-push
    timeout-minutes: 20
    env:
      ADP_SMTP_HOST: ${{ secrets.ADP_SMTP_HOST }}
      ADP_SMTP_PORT: ${{ secrets.ADP_SMTP_PORT }}
      ADP_SMTP_USERNAME: ${{ secrets.ADP_SMTP_USERNAME }}
      ADP_SMTP_PASSWORD: ${{ secrets.ADP_SMTP_PASSWORD }}
      ADP_RELEASE_TARGET: ${{ vars.ADP_RELEASE_TARGET }}
      ADP_SELF_HOSTED_RUNNER_LABEL: arxiv-daily-push
      ADP_SCHEDULED_RUN_ENABLED: ${{ vars.ADP_SCHEDULED_RUN_ENABLED }}
      ADP_DAILY_INPUT_PATH: ${{ vars.ADP_DAILY_INPUT_PATH }}
      ADP_ARXIV_QUERY: ${{ vars.ADP_ARXIV_QUERY }}
      ADP_ARXIV_MAX_RESULTS: ${{ vars.ADP_ARXIV_MAX_RESULTS }}
      ADP_RECENT_SOURCE_IDS: ${{ vars.ADP_RECENT_SOURCE_IDS }}
      ADP_ALLOW_SMTP_SEND: ${{ vars.ADP_ALLOW_SMTP_SEND }}
      ADP_ALLOW_RELEASE_UPLOAD: ${{ vars.ADP_ALLOW_RELEASE_UPLOAD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve generated_at
        id: generated_at
        shell: bash
        run: |
          if [ -n "${{ inputs.generated_at }}" ]; then
            printf 'value=%s\n' "${{ inputs.generated_at }}" >> "$GITHUB_OUTPUT"
          else
            printf 'value=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          fi
      - name: Run production preflight
        id: preflight
        shell: bash
        run: |
          set +e
          output="$RUNNER_TEMP/adp-scheduled-preflight.json"
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_scheduled_preflight" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push preflight-production \
              --path . \
              --generated-at "${{ steps.generated_at.outputs.value }}" \
              --json > "$output"
          code=$?
          cat "$output"
          printf 'exit_code=%s\n' "$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload scheduled preflight artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adp-scheduled-preflight
          path: ${{ runner.temp }}/adp-scheduled-preflight.json
          if-no-files-found: error
          retention-days: 35
      - name: Build scheduled daily input
        id: daily_input
        if: needs.gate.outputs.mode == 'daily-run' && env.ADP_DAILY_INPUT_PATH == ''
        shell: bash
        run: |
          set +e
          source_batch="$RUNNER_TEMP/adp-scheduled-source-batch.json"
          daily_input="$RUNNER_TEMP/adp-scheduled-daily-input.json"
          query="${ADP_ARXIV_QUERY:-cat:cs.AI}"
          max_results="${ADP_ARXIV_MAX_RESULTS:-10}"
          generated_at="${{ steps.generated_at.outputs.value }}"
          daily_date="$(python3 - "$generated_at" <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import sys

          value = sys.argv[1].replace("Z", "+00:00")
          print(datetime.fromisoformat(value).astimezone(ZoneInfo("Australia/Sydney")).date())
          PY
          )"
          seen_args=()
          if [ -n "${ADP_RECENT_SOURCE_IDS:-}" ]; then
            IFS=',' read -ra raw_seen_ids <<< "$ADP_RECENT_SOURCE_IDS"
            for raw_seen_id in "${raw_seen_ids[@]}"; do
              seen_id="${raw_seen_id#"${raw_seen_id%%[![:space:]]*}"}"
              seen_id="${seen_id%"${seen_id##*[![:space:]]}"}"
              if [ -n "$seen_id" ]; then
                seen_args+=(--seen-source-id "$seen_id")
              fi
            done
          fi
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_scheduled_source_ingest" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push fetch-arxiv-latest \
              --query "$query" \
              --max-results "$max_results" \
              --generated-at "$generated_at" \
              "${seen_args[@]}" \
              --json > "$source_batch"
          source_code=$?
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_scheduled_daily_input" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push build-daily-input \
              --source-batch "$source_batch" \
              --date "$daily_date" \
              --generated-at "$generated_at" \
              --timezone "Australia/Sydney" \
              "${seen_args[@]}" \
              --json > "$daily_input"
          daily_code=$?
          cat "$source_batch"
          cat "$daily_input"
          printf 'source_batch_path=%s\n' "$source_batch" >> "$GITHUB_OUTPUT"
          printf 'daily_input_path=%s\n' "$daily_input" >> "$GITHUB_OUTPUT"
          printf 'source_exit_code=%s\n' "$source_code" >> "$GITHUB_OUTPUT"
          printf 'daily_input_exit_code=%s\n' "$daily_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload scheduled source batch artifact
        if: always() && steps.daily_input.outputs.source_batch_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: adp-scheduled-source-batch
          path: ${{ steps.daily_input.outputs.source_batch_path }}
          if-no-files-found: error
          retention-days: 35
      - name: Upload scheduled daily input artifact
        if: always() && steps.daily_input.outputs.daily_input_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: adp-scheduled-daily-input
          path: ${{ steps.daily_input.outputs.daily_input_path }}
          if-no-files-found: error
          retention-days: 35
      - name: Run scheduled mode
        id: scheduled_execution
        shell: bash
        run: |
          set +e
          output="$RUNNER_TEMP/adp-scheduled-execution.json"
          resolved_daily_input="${ADP_DAILY_INPUT_PATH:-}"
          if [ -z "$resolved_daily_input" ]; then
            resolved_daily_input="${{ steps.daily_input.outputs.daily_input_path }}"
          fi
          command=(
            python3 -m arxiv_daily_push run-scheduled-production
            --mode "${{ needs.gate.outputs.mode }}"
            --generated-at "${{ steps.generated_at.outputs.value }}"
            --preflight-report "$RUNNER_TEMP/adp-scheduled-preflight.json"
            --json
          )
          if [ -n "$resolved_daily_input" ]; then
            command+=(--daily-input "$resolved_daily_input" --release-asset "$resolved_daily_input")
          fi
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_scheduled_execution" \
          PYTHONPATH=arxiv-daily-push/src \
            "${command[@]}" > "$output"
          code=$?
          cat "$output"
          printf 'exit_code=%s\n' "$code" >> "$GITHUB_OUTPUT"
          {
            echo "## arXiv Daily Push scheduled mode"
            echo "- mode: ${{ needs.gate.outputs.mode }}"
            echo "- generated_at: ${{ steps.generated_at.outputs.value }}"
            echo "- scheduled_run_enabled: ${ADP_SCHEDULED_RUN_ENABLED:-false}"
            echo "- real SMTP requested: ${ADP_ALLOW_SMTP_SEND:-false}"
            echo "- real Release requested: ${ADP_ALLOW_RELEASE_UPLOAD:-false}"
            echo "- daily input path: ${resolved_daily_input:-not-provided}"
            echo "- execution_exit_code: $code"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
      - name: Upload scheduled execution artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adp-scheduled-execution
          path: ${{ runner.temp }}/adp-scheduled-execution.json
          if-no-files-found: error
          retention-days: 35
      - name: Stop if preflight blocked
        if: steps.preflight.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "scheduled production preflight blocked; scheduled execution evidence was uploaded"
          exit "${{ steps.preflight.outputs.exit_code }}"
      - name: Stop if scheduled execution blocked
        if: steps.scheduled_execution.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "scheduled execution did not produce production-ready evidence"
          exit "${{ steps.scheduled_execution.outputs.exit_code }}"
