name: Agent Loop - Run Approved Task Pack

on:
  workflow_dispatch:
    inputs:
      taskpack:
        description: Paste the approved dual-plane Task Pack generated by ChatGPT
        required: true
        type: string
      dry_run:
        description: Validate and plan only; do not implement or merge
        required: false
        default: false
        type: boolean
  issues:
    types: [opened, edited, labeled]
  repository_dispatch:
    types: [agent_loop_taskpack]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'issues' && github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  run-approved-taskpack:
    if: >-
      github.event_name != 'issues' ||
      (
        github.event.issue.body &&
        contains(github.event.issue.body, 'AGENT_LOOP_METADATA') &&
        !contains(toJson(github.event.issue.labels), 'agent:running') &&
        !contains(toJson(github.event.issue.labels), 'agent:done') &&
        !contains(toJson(github.event.issue.labels), 'agent:blocked') &&
        (
          github.event.issue.user.login == github.repository_owner ||
          github.event.issue.author_association == 'OWNER' ||
          github.event.issue.author_association == 'MEMBER' ||
          github.event.issue.author_association == 'COLLABORATOR'
        ) &&
        (
          github.event.action == 'opened' ||
          github.event.action == 'edited' ||
          (github.event.action == 'labeled' && github.event.label.name == 'agent:run')
        )
      )
    runs-on: ubuntu-latest
    env:
      TASKPACK_PATH: /tmp/agent_loop/taskpack.md
      RAW_TASKPACK_PATH: /tmp/agent_loop/taskpack.raw.md
      WORK_DIR: agent-loop-work
      AUDIT_ISSUE: ${{ github.event_name == 'issues' && github.event.issue.number || '' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      GH_TOKEN: ${{ github.token }}
      AUTOFIX_LOOPS_USED: "0"
      MAX_AUTOFIX_LOOPS: "0"
      VALIDATION_STATUS: FAIL
      CHANGED_FILES_STATUS: FAIL
      PLAN_STATUS: FAIL
      ROUTING_STATUS: FAIL
      TASKPACK_STATUS: FAIL
      NEEDS_AUTOFIX: "false"
      REVIEW_NEEDS_AUTOFIX: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Normalize approved Task Pack
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          WORKFLOW_TASKPACK: ${{ github.event_name == 'workflow_dispatch' && inputs.taskpack || '' }}
          ISSUE_BODY: ${{ github.event_name == 'issues' && github.event.issue.body || '' }}
          ISSUE_LABEL_NAME: ${{ github.event_name == 'issues' && github.event.label.name || '' }}
          ISSUE_LABELS_JSON: ${{ github.event_name == 'issues' && toJson(github.event.issue.labels) || '[]' }}
          DISPATCH_TASKPACK: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.taskpack || '' }}
          DISPATCH_TITLE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.title || '' }}
          DISPATCH_SOURCE: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source || '' }}
        run: |
          mkdir -p /tmp/agent_loop "$WORK_DIR"
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          meta_re = re.compile(
              r"<!--\s*AGENT_LOOP_METADATA\s*(.*?)\s*END_AGENT_LOOP_METADATA\s*-->",
              re.DOTALL,
          )
          event_name = os.environ["EVENT_NAME"]
          event_action = os.environ.get("EVENT_ACTION", "")
          taskpack = ""
          mode = event_name

          if event_name == "workflow_dispatch":
              taskpack = os.environ.get("WORKFLOW_TASKPACK", "")
          elif event_name == "issues":
              labels = json.loads(os.environ.get("ISSUE_LABELS_JSON") or "[]")
              label_names = {str(item.get("name", "")) for item in labels if isinstance(item, dict)}
              if event_action not in {"opened", "edited", "labeled"}:
                  raise SystemExit("issues trigger ignored because action is not opened, edited, or labeled")
              blocked = {"agent:running", "agent:done", "agent:blocked"}
              present_blocked = sorted(blocked & label_names)
              if present_blocked:
                  raise SystemExit(f"issues trigger blocked by state labels: {', '.join(present_blocked)}")
              taskpack = os.environ.get("ISSUE_BODY", "")
              match = meta_re.search(taskpack)
              if not match:
                  raise SystemExit("issue body must contain AGENT_LOOP_METADATA")
              try:
                  metadata = json.loads(match.group(1))
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"metadata JSON parse failed: {exc}") from exc
              if not isinstance(metadata, dict):
                  raise SystemExit("metadata must be a JSON object")
              if metadata.get("source") != "chatgpt-approved":
                  raise SystemExit("issue Task Pack metadata source must be chatgpt-approved")
          elif event_name == "repository_dispatch":
              if event_action != "agent_loop_taskpack":
                  raise SystemExit("repository_dispatch action must be agent_loop_taskpack")
              payload_source = os.environ.get("DISPATCH_SOURCE", "")
              if payload_source and payload_source != "chatgpt-approved":
                  raise SystemExit("repository_dispatch source must be chatgpt-approved when provided")
              taskpack = os.environ.get("DISPATCH_TASKPACK", "")
          else:
              raise SystemExit(f"unsupported event: {event_name}")

          if "AGENT_LOOP_METADATA" not in taskpack:
              raise SystemExit(f"{mode} Task Pack must contain AGENT_LOOP_METADATA")
          Path("/tmp/agent_loop/taskpack.raw.md").write_text(taskpack, encoding="utf-8")
          Path("agent-loop-work/ingestion-mode.txt").write_text(mode + "\n", encoding="utf-8")
          Path("agent-loop-work/repository-dispatch-title.txt").write_text(
              os.environ.get("DISPATCH_TITLE", "") + "\n",
              encoding="utf-8",
          )
          print(f"INGESTION_MODE={mode}")
          PY

      - name: Acquire issue live lock
        id: preflight
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event_name == 'issues' && github.event.issue.number || '' }}
        run: |
          mkdir -p "$WORK_DIR"
          if [ "$EVENT_NAME" != "issues" ]; then
            echo "should_continue=true" >> "$GITHUB_OUTPUT"
            echo "PRECHECK_STATUS=CONTINUE" > "$WORK_DIR/preflight-summary.md"
            exit 0
          fi

          labels_json="$(gh issue view "$ISSUE_NUMBER" --json labels)"
          export LIVE_ISSUE_LABELS_JSON="$labels_json"
          python3 - <<'PY' > "$WORK_DIR/live-labels.txt"
          import json
          import os

          payload = json.loads(os.environ.get("LIVE_ISSUE_LABELS_JSON") or "{}")
          labels = payload.get("labels") or []
          names = sorted(
              str(item.get("name", ""))
              for item in labels
              if isinstance(item, dict) and str(item.get("name", "")).strip()
          )
          print("\n".join(names))
          PY

          blocked_labels="$(grep -E '^(agent:running|agent:done|agent:blocked)$' "$WORK_DIR/live-labels.txt" || true)"
          if [ -n "$blocked_labels" ]; then
            {
              echo "PRECHECK_STATUS=DUPLICATE_IGNORED"
              echo "Issue #${ISSUE_NUMBER} already has an Agent Loop state label."
              echo
              echo "$blocked_labels"
            } > "$WORK_DIR/preflight-summary.md"
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            cat "$WORK_DIR/preflight-summary.md"
            exit 0
          fi

          gh label create "agent:run" --color "5319e7" --description "Agent Loop run" || true
          gh label create "agent:running" --color "1d76db" --description "Agent Loop is running" || true
          gh label create "agent:done" --color "0e8a16" --description "Agent Loop completed" || true
          gh label create "agent:blocked" --color "b60205" --description "Agent Loop blocked" || true
          gh label create "source:chatgpt-approved" --color "0e8a16" --description "Approved ChatGPT Task Pack" || true
          gh label create "risk:T1" --color "fbca04" --description "Agent Loop risk tier T1" || true
          gh label create "risk:T2" --color "fbca04" --description "Agent Loop risk tier T2" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "source:chatgpt-approved" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:run" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:running" || true

          {
            echo "PRECHECK_STATUS=CONTINUE"
            echo "Issue #${ISSUE_NUMBER} acquired agent:running live lock."
          } > "$WORK_DIR/preflight-summary.md"
          echo "should_continue=true" >> "$GITHUB_OUTPUT"
          cat "$WORK_DIR/preflight-summary.md"

      - name: Stop duplicate issue trigger
        if: ${{ steps.preflight.outputs.should_continue == 'false' }}
        run: |
          cat "$WORK_DIR/preflight-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload duplicate trigger artifact
        if: ${{ steps.preflight.outputs.should_continue == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-loop-duplicate-${{ github.run_id }}
          path: agent-loop-work/preflight-summary.md

      - name: Prepare Agent Loop labels
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          gh label create "agent:run" --color "5319e7" --description "Agent Loop run" || true
          gh label create "agent:running" --color "1d76db" --description "Agent Loop is running" || true
          gh label create "agent:done" --color "0e8a16" --description "Agent Loop completed" || true
          gh label create "agent:blocked" --color "b60205" --description "Agent Loop blocked" || true
          gh label create "source:chatgpt-approved" --color "0e8a16" --description "Approved ChatGPT Task Pack" || true
          gh label create "risk:T1" --color "fbca04" --description "Agent Loop risk tier T1" || true
          gh label create "risk:T2" --color "fbca04" --description "Agent Loop risk tier T2" || true

      - name: Resolve audit issue
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        id: audit
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event_name == 'issues' && github.event.issue.number || '' }}
        run: |
          python3 - <<'PY' > "$WORK_DIR/raw-title.txt"
          from pathlib import Path
          text = Path("/tmp/agent_loop/taskpack.raw.md").read_text(encoding="utf-8", errors="ignore")
          for line in text.splitlines():
              if line.startswith("# "):
                  print(line[2:].strip()[:120] or "Approved Task Pack")
                  break
          else:
              print("Approved Task Pack")
          PY
          title="$(cat "$WORK_DIR/raw-title.txt")"
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            dispatch_title="$(cat "$WORK_DIR/repository-dispatch-title.txt")"
            if [ -n "$dispatch_title" ]; then
              title="$dispatch_title"
            fi
          fi

          if [ "$EVENT_NAME" = "issues" ]; then
            echo "AUDIT_ISSUE=${ISSUE_NUMBER}" >> "$GITHUB_ENV"
            echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
            gh issue edit "$ISSUE_NUMBER" --add-label "source:chatgpt-approved" || true
            gh issue edit "$ISSUE_NUMBER" --add-label "agent:run" || true
            gh issue edit "$ISSUE_NUMBER" --add-label "agent:running" || true
            gh issue comment "$ISSUE_NUMBER" --body "Agent Loop run started from this approved Task Pack issue: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          else
            {
              echo "Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
              echo
              echo "Ingestion mode: $EVENT_NAME"
              echo
              echo "Raw approved Task Pack:"
              echo
              cat "$RAW_TASKPACK_PATH"
            } > "$WORK_DIR/audit-issue-body.md"
            issue_url="$(gh issue create \
              --title "[Agent Loop] ${title}" \
              --body-file "$WORK_DIR/audit-issue-body.md" \
              --label "agent:run" \
              --label "agent:running" \
              --label "source:chatgpt-approved")"
            issue_number="${issue_url##*/}"
            echo "AUDIT_ISSUE=${issue_number}" >> "$GITHUB_ENV"
            echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
            gh issue edit "$issue_number" --add-label "agent:running" || true
          fi

      - name: Autofill Task Pack routing metadata
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          set +e
          python3 scripts/agent_loop/autofill_taskpack_metadata.py \
            --input "$RAW_TASKPACK_PATH" \
            --output "$TASKPACK_PATH" \
            --report "$WORK_DIR/routing-report.json" \
            > "$WORK_DIR/routing-output.txt" 2>&1
          status=$?
          cat "$WORK_DIR/routing-output.txt"
          if [ "$status" -eq 0 ]; then
            echo "ROUTING_STATUS=READY" >> "$GITHUB_ENV"
          else
            echo "ROUTING_STATUS=BLOCKED" >> "$GITHUB_ENV"
            exit "$status"
          fi

      - name: Extract Task Pack metadata
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          python3 scripts/agent_loop/extract_taskpack.py \
            --input "$TASKPACK_PATH" \
            --out-dir "$WORK_DIR" | tee "$WORK_DIR/extract-output.txt"
          {
            grep '^RISK_TIER=' "$WORK_DIR/extract-output.txt" || true
            grep '^MAX_AUTOFIX_LOOPS=' "$WORK_DIR/extract-output.txt" || true
          } >> "$GITHUB_ENV"

      - name: Validate Task Pack
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          set +e
          python3 scripts/agent_loop/validate_taskpack.py \
            --taskpack "$TASKPACK_PATH" \
            --metadata-out "$WORK_DIR/metadata.json" \
            > "$WORK_DIR/taskpack-validation.txt" 2>&1
          status=$?
          cat "$WORK_DIR/taskpack-validation.txt"
          if [ "$status" -eq 0 ]; then
            echo "TASKPACK_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "TASKPACK_STATUS=FAIL" >> "$GITHUB_ENV"
            exit "$status"
          fi

      - name: Apply risk label
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          gh label create "risk:T1" --color "fbca04" --description "Agent Loop risk tier T1" || true
          gh label create "risk:T2" --color "fbca04" --description "Agent Loop risk tier T2" || true
          gh issue edit "$AUDIT_ISSUE" --add-label "risk:${RISK_TIER}" || true

      - name: Check OPENAI_API_KEY
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        env:
          OPENAI_API_KEY_PRESENT: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "$OPENAI_API_KEY_PRESENT" != "true" ]; then
            echo "OPENAI_API_KEY is required as a GitHub Actions secret." >&2
            exit 1
          fi

      - name: Prepare routing and branch
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          metadata = json.load(open("agent-loop-work/metadata.json"))
          project = str(metadata["project"]).strip()
          risk = str(metadata["risk_tier"]).strip()

          def sanitize(value: str) -> str:
              value = value.strip().lower()
              value = re.sub(r"[^a-z0-9._/-]+", "-", value)
              value = re.sub(r"/+", "/", value).strip("/.-")
              return value or "unknown-project"

          branch_project = sanitize(project)
          branch = f"agent/{branch_project}/{os.environ['GITHUB_RUN_ID']}"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"PROJECT={project}\n")
              env.write(f"RISK_TIER={risk}\n")
              env.write(f"BRANCH_NAME={branch}\n")
          Path("agent-loop-work/branch-name.txt").write_text(branch + "\n", encoding="utf-8")
          Path("agent-loop-work/project.txt").write_text(project + "\n", encoding="utf-8")
          PY

      - name: Create working branch
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          git checkout -B "$BRANCH_NAME"

      - name: Build Codex plan prompt
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          {
            cat .github/codex/prompts/codex-plan.md
            echo
            echo "# Approved Task Pack"
            cat "$TASKPACK_PATH"
          } > "$WORK_DIR/codex-plan-prompt.md"

      - name: Run Codex plan
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        id: codex_plan
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: agent-loop-work/codex-plan-prompt.md
          output-file: agent-loop-work/codex-plan.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Verify plan made no repository changes
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          git diff --quiet
          git diff --cached --quiet

      - name: Validate Codex plan
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          set +e
          python3 scripts/agent_loop/validate_plan.py \
            --taskpack "$TASKPACK_PATH" \
            --plan "$WORK_DIR/codex-plan.md" \
            > "$WORK_DIR/plan-validation.txt" 2>&1
          status=$?
          cat "$WORK_DIR/plan-validation.txt"
          if [ "$status" -eq 0 ]; then
            echo "PLAN_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "PLAN_STATUS=FAIL" >> "$GITHUB_ENV"
            exit "$status"
          fi

      - name: Comment plan on audit issue
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        run: |
          {
            echo "## Codex Plan"
            echo
            cat "$WORK_DIR/codex-plan.md"
            echo
            echo "## Plan Validation"
            echo
            cat "$WORK_DIR/plan-validation.txt"
          } > "$WORK_DIR/plan-comment.md"
          gh issue comment "$AUDIT_ISSUE" --body-file "$WORK_DIR/plan-comment.md"

      - name: Upload plan artifact
        if: ${{ steps.preflight.outputs.should_continue == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-loop-plan-${{ github.run_id }}
          path: |
            /tmp/agent_loop/taskpack.md
            agent-loop-work/codex-plan.md
            agent-loop-work/plan-validation.txt

      - name: Stop after dry run
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN == 'true' }}
        run: |
          gh issue comment "$AUDIT_ISSUE" --body "Dry run complete. Plan validation passed. No implementation, PR, or merge was attempted."
          exit 0

      - name: Build Codex implementation prompt
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          {
            cat .github/codex/prompts/codex-implement.md
            echo
            echo "# Approved Task Pack"
            cat "$TASKPACK_PATH"
            echo
            echo "# Validated Codex Plan"
            cat "$WORK_DIR/codex-plan.md"
          } > "$WORK_DIR/codex-implement-prompt.md"

      - name: Run Codex implementation
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        id: codex_implement
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: agent-loop-work/codex-implement-prompt.md
          output-file: agent-loop-work/codex-implement.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Run Task Pack validation commands
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          metadata = json.load(open("agent-loop-work/metadata.json"))
          commands = metadata.get("validation_commands") or []
          blocked = re.compile(r"(?i)(\brm\s+-rf\b|\bsudo\b|\bdeploy\b|\bproduction\b|curl\s+.*\|\s*sh|wget\s+.*\|\s*sh)")
          safe = []
          for command in commands:
              if blocked.search(command):
                  raise SystemExit(f"unsafe validation command blocked: {command}")
              safe.append(command)
          if not safe:
              raise SystemExit("no validation commands available")
          Path("agent-loop-work/run-validation.sh").write_text(
              "#!/usr/bin/env bash\nset -euo pipefail\n" + "\n".join(safe) + "\n",
              encoding="utf-8",
          )
          PY
          set +e
          bash "$WORK_DIR/run-validation.sh" > "$WORK_DIR/validation-output.txt" 2>&1
          status=$?
          cat "$WORK_DIR/validation-output.txt"
          if [ "$status" -eq 0 ]; then
            echo "VALIDATION_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "VALIDATION_STATUS=FAIL" >> "$GITHUB_ENV"
          fi

      - name: Run changed-files policy
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          {
            git diff --name-only
            git diff --cached --name-only
            git ls-files --others --exclude-standard
          } | sort -u > "$WORK_DIR/changed-files.txt"
          args=()
          while IFS= read -r file; do
            [ -n "$file" ] && args+=(--changed-file "$file")
          done < "$WORK_DIR/changed-files.txt"
          set +e
          python3 scripts/agent_loop/changed_files_policy.py \
            --taskpack "$TASKPACK_PATH" \
            "${args[@]}" > "$WORK_DIR/changed-files-policy.txt" 2>&1
          status=$?
          cat "$WORK_DIR/changed-files-policy.txt"
          if [ "$status" -eq 0 ]; then
            echo "CHANGED_FILES_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "CHANGED_FILES_STATUS=FAIL" >> "$GITHUB_ENV"
          fi

      - name: Decide initial autofix
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          if [ "$VALIDATION_STATUS" != "PASS" ] || [ "$CHANGED_FILES_STATUS" != "PASS" ]; then
            echo "NEEDS_AUTOFIX=true" >> "$GITHUB_ENV"
          else
            echo "NEEDS_AUTOFIX=false" >> "$GITHUB_ENV"
          fi

      - name: Build Codex autofix prompt
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' && env.NEEDS_AUTOFIX == 'true' && fromJSON(env.MAX_AUTOFIX_LOOPS) > 0 }}
        run: |
          {
            cat .github/codex/prompts/codex-autofix.md
            echo
            echo "# Approved Task Pack"
            cat "$TASKPACK_PATH"
            echo
            echo "# Current Diff"
            git diff
            echo
            echo "# Validation Output"
            cat "$WORK_DIR/validation-output.txt" || true
            echo
            echo "# Changed Files Policy"
            cat "$WORK_DIR/changed-files-policy.txt" || true
          } > "$WORK_DIR/codex-autofix-prompt.md"

      - name: Run Codex autofix before PR
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' && env.NEEDS_AUTOFIX == 'true' && fromJSON(env.MAX_AUTOFIX_LOOPS) > 0 }}
        id: codex_autofix_pre_pr
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: agent-loop-work/codex-autofix-prompt.md
          output-file: agent-loop-work/codex-autofix-pre-pr.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Re-run validation after initial autofix
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' && env.NEEDS_AUTOFIX == 'true' && fromJSON(env.MAX_AUTOFIX_LOOPS) > 0 }}
        run: |
          echo "AUTOFIX_LOOPS_USED=1" >> "$GITHUB_ENV"
          set +e
          bash "$WORK_DIR/run-validation.sh" > "$WORK_DIR/validation-output.txt" 2>&1
          status=$?
          cat "$WORK_DIR/validation-output.txt"
          if [ "$status" -eq 0 ]; then
            echo "VALIDATION_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "VALIDATION_STATUS=FAIL" >> "$GITHUB_ENV"
          fi
          {
            git diff --name-only
            git diff --cached --name-only
            git ls-files --others --exclude-standard
          } | sort -u > "$WORK_DIR/changed-files.txt"
          args=()
          while IFS= read -r file; do
            [ -n "$file" ] && args+=(--changed-file "$file")
          done < "$WORK_DIR/changed-files.txt"
          set +e
          python3 scripts/agent_loop/changed_files_policy.py \
            --taskpack "$TASKPACK_PATH" \
            "${args[@]}" > "$WORK_DIR/changed-files-policy.txt" 2>&1
          status=$?
          cat "$WORK_DIR/changed-files-policy.txt"
          if [ "$status" -eq 0 ]; then
            echo "CHANGED_FILES_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "CHANGED_FILES_STATUS=FAIL" >> "$GITHUB_ENV"
          fi

      - name: Commit and push implementation branch
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "Codex implementation produced no repository changes." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          while IFS= read -r file; do
            [ -n "$file" ] && git add "$file"
          done < "$WORK_DIR/changed-files.txt"
          git commit -m "Agent Loop task: ${PROJECT}"
          git push --set-upstream origin "$BRANCH_NAME"

      - name: Create pull request
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        id: pr
        run: |
          title="$(cat "$WORK_DIR/title.txt")"
          {
            echo "# Agent Loop PR"
            echo
            echo "Audit issue: #${AUDIT_ISSUE}"
            echo
            echo "Project: ${PROJECT}"
            echo
            echo "## Approved Task Pack"
            echo
            cat "$TASKPACK_PATH"
            echo
            echo "## Plan"
            echo
            cat "$WORK_DIR/codex-plan.md"
            echo
            echo "## Validation"
            echo
            cat "$WORK_DIR/validation-output.txt" || true
            echo
            echo "## Changed Files Policy"
            echo
            cat "$WORK_DIR/changed-files-policy.txt" || true
          } > "$WORK_DIR/pr-body.md"
          pr_url="$(gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "[Agent Loop] ${title}" \
            --body-file "$WORK_DIR/pr-body.md" \
            --label "agent:run")"
          pr_number="${pr_url##*/}"
          echo "PR_NUMBER=${pr_number}" >> "$GITHUB_ENV"
          echo "PR_URL=${pr_url}" >> "$GITHUB_ENV"
          gh issue comment "$AUDIT_ISSUE" --body "Implementation PR created: ${pr_url}"

      - name: Build PR diff and review prompt
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          git diff origin/main...HEAD > "$WORK_DIR/pr.diff"
          {
            cat .github/codex/prompts/codex-review.md
            echo
            echo "# Approved Task Pack"
            cat "$TASKPACK_PATH"
            echo
            echo "# PR Diff"
            cat "$WORK_DIR/pr.diff"
            echo
            echo "# Validation"
            cat "$WORK_DIR/validation-output.txt" || true
            echo
            echo "# Changed Files Policy"
            cat "$WORK_DIR/changed-files-policy.txt" || true
          } > "$WORK_DIR/codex-review-prompt.md"

      - name: Run Codex review
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        id: codex_review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: agent-loop-work/codex-review-prompt.md
          output-file: agent-loop-work/codex-review.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Run optional Architect Review
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/agent_loop/architect_review.py \
            --taskpack "$TASKPACK_PATH" \
            --diff "$WORK_DIR/pr.diff" \
            --validation "$WORK_DIR/validation-output.txt" \
            --codex-review "$WORK_DIR/codex-review.md" \
            --output "$WORK_DIR/architect-review.md"

      - name: Decide review autofix
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          text = ""
          for path in ["agent-loop-work/codex-review.md", "agent-loop-work/architect-review.md"]:
              file_path = Path(path)
              if file_path.exists():
                  text += "\n" + file_path.read_text(encoding="utf-8", errors="ignore")
          needs = bool(re.search(r"(?i)unresolved\s+p[01]\s*:\s*(yes|true)", text))
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"REVIEW_NEEDS_AUTOFIX={'true' if needs else 'false'}\n")
          PY

      - name: Build review autofix prompt
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' && env.REVIEW_NEEDS_AUTOFIX == 'true' && fromJSON(env.MAX_AUTOFIX_LOOPS) > fromJSON(env.AUTOFIX_LOOPS_USED) }}
        run: |
          {
            cat .github/codex/prompts/codex-autofix.md
            echo
            echo "# Approved Task Pack"
            cat "$TASKPACK_PATH"
            echo
            echo "# Current Diff"
            git diff origin/main...HEAD
            echo
            echo "# Validation Output"
            cat "$WORK_DIR/validation-output.txt" || true
            echo
            echo "# Codex Review"
            cat "$WORK_DIR/codex-review.md" || true
            echo
            echo "# Architect Review"
            cat "$WORK_DIR/architect-review.md" || true
          } > "$WORK_DIR/codex-autofix-review-prompt.md"

      - name: Run Codex autofix after review
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' && env.REVIEW_NEEDS_AUTOFIX == 'true' && fromJSON(env.MAX_AUTOFIX_LOOPS) > fromJSON(env.AUTOFIX_LOOPS_USED) }}
        id: codex_autofix_review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: agent-loop-work/codex-autofix-review-prompt.md
          output-file: agent-loop-work/codex-autofix-review.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Commit review autofix and revalidate
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' && env.REVIEW_NEEDS_AUTOFIX == 'true' && fromJSON(env.MAX_AUTOFIX_LOOPS) > fromJSON(env.AUTOFIX_LOOPS_USED) }}
        run: |
          echo "AUTOFIX_LOOPS_USED=$((AUTOFIX_LOOPS_USED + 1))" >> "$GITHUB_ENV"
          set +e
          bash "$WORK_DIR/run-validation.sh" > "$WORK_DIR/validation-output.txt" 2>&1
          status=$?
          cat "$WORK_DIR/validation-output.txt"
          if [ "$status" -eq 0 ]; then
            echo "VALIDATION_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "VALIDATION_STATUS=FAIL" >> "$GITHUB_ENV"
          fi
          git diff origin/main...HEAD > "$WORK_DIR/pr.diff"
          set +e
          python3 scripts/agent_loop/changed_files_policy.py \
            --taskpack "$TASKPACK_PATH" \
            --base-ref origin/main > "$WORK_DIR/changed-files-policy.txt" 2>&1
          status=$?
          cat "$WORK_DIR/changed-files-policy.txt"
          if [ "$status" -eq 0 ]; then
            echo "CHANGED_FILES_STATUS=PASS" >> "$GITHUB_ENV"
          else
            echo "CHANGED_FILES_STATUS=FAIL" >> "$GITHUB_ENV"
          fi
          if ! git diff --quiet || ! git diff --cached --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            git add .
            git commit -m "Autofix Agent Loop review findings"
            git push
          fi

      - name: Comment review results
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          {
            echo "## Codex Review"
            echo
            cat "$WORK_DIR/codex-review.md" || true
            echo
            echo "## Architect Review"
            echo
            cat "$WORK_DIR/architect-review.md" || true
            echo
            echo "## Validation"
            echo
            cat "$WORK_DIR/validation-output.txt" || true
            echo
            echo "## Changed Files Policy"
            echo
            cat "$WORK_DIR/changed-files-policy.txt" || true
          } > "$WORK_DIR/review-comment.md"
          gh pr comment "$PR_NUMBER" --body-file "$WORK_DIR/review-comment.md"
          gh issue comment "$AUDIT_ISSUE" --body-file "$WORK_DIR/review-comment.md"

      - name: Run merge policy
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          set +e
          python3 scripts/agent_loop/merge_policy.py \
            --taskpack "$TASKPACK_PATH" \
            --plan "$WORK_DIR/codex-plan.md" \
            --taskpack-status "$TASKPACK_STATUS" \
            --plan-status "$PLAN_STATUS" \
            --validation-status "$VALIDATION_STATUS" \
            --changed-files-status "$CHANGED_FILES_STATUS" \
            --review-file "$WORK_DIR/codex-review.md" \
            --review-file "$WORK_DIR/architect-review.md" \
            --output-json "$WORK_DIR/merge-policy.json" \
            > "$WORK_DIR/merge-policy.txt" 2>&1
          status=$?
          cat "$WORK_DIR/merge-policy.txt"
          gh issue comment "$AUDIT_ISSUE" --body-file "$WORK_DIR/merge-policy.txt"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Squash merge PR
        if: ${{ steps.preflight.outputs.should_continue == 'true' && env.DRY_RUN != 'true' }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          gh issue edit "$AUDIT_ISSUE" --remove-label "agent:running" || true
          gh issue edit "$AUDIT_ISSUE" --add-label "agent:done" || true
          gh issue comment "$AUDIT_ISSUE" --body "PR #${PR_NUMBER} merged with squash. Production deployment was not attempted."
          gh issue close "$AUDIT_ISSUE" --comment "Agent Loop completed and audit issue closed."

      - name: Mark audit issue blocked on failure
        if: ${{ failure() && env.AUDIT_ISSUE != '' && steps.preflight.outputs.should_continue != 'false' }}
        run: |
          mkdir -p "$WORK_DIR"
          gh label create "agent:running" --color "1d76db" --description "Agent Loop is running" || true
          gh label create "agent:blocked" --color "b60205" --description "Agent Loop blocked" || true
          gh issue edit "$AUDIT_ISSUE" --remove-label "agent:running" || true
          gh issue edit "$AUDIT_ISSUE" --add-label "agent:blocked" || true
          {
            echo "## Agent Loop Failure"
            echo
            echo "Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "Routing status: ${ROUTING_STATUS}"
            echo "TaskPack status: ${TASKPACK_STATUS}"
            echo "Plan status: ${PLAN_STATUS}"
            echo "Validation status: ${VALIDATION_STATUS}"
            echo "Changed-files status: ${CHANGED_FILES_STATUS}"
            echo
            for file in \
              "$WORK_DIR/routing-output.txt" \
              "$WORK_DIR/routing-report.json" \
              "$WORK_DIR/taskpack-validation.txt" \
              "$WORK_DIR/plan-validation.txt" \
              "$WORK_DIR/validation-output.txt" \
              "$WORK_DIR/changed-files-policy.txt" \
              "$WORK_DIR/merge-policy.txt"; do
              if [ -f "$file" ]; then
                echo "### $file"
                echo
                sed -n '1,160p' "$file"
                echo
              fi
            done
          } > "$WORK_DIR/failure-summary.md"
          gh issue comment "$AUDIT_ISSUE" --body-file "$WORK_DIR/failure-summary.md"

      - name: Write summary artifact
        if: ${{ always() && steps.preflight.outputs.should_continue == 'true' }}
        run: |
          python3 scripts/agent_loop/write_summary.py \
            --taskpack "$TASKPACK_PATH" \
            --plan "$WORK_DIR/codex-plan.md" \
            --validation "$WORK_DIR/validation-output.txt" \
            --review "$WORK_DIR/codex-review.md" \
            --architect "$WORK_DIR/architect-review.md" \
            --merge "$WORK_DIR/merge-policy.txt" \
            --output "$WORK_DIR/summary.md" || true

      - name: Upload final artifacts
        if: ${{ always() && steps.preflight.outputs.should_continue == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-loop-run-${{ github.run_id }}
          path: |
            /tmp/agent_loop/
            agent-loop-work/
