name: arXiv Daily Push Stage 1 bootstrap

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/arxiv-daily-push-stage1-bootstrap.yml"
      - "arxiv-daily-push/**"
      - "governance/**"
      - "scripts/**"
      - "tests/governance/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/arxiv-daily-push-stage1-bootstrap.yml"
      - "arxiv-daily-push/**"
      - "governance/**"
      - "scripts/**"
      - "tests/governance/**"

permissions:
  contents: read

jobs:
  stage1-bootstrap:
    name: stage1-bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ADP_PRODUCTION_ENABLED: "false"
      ADP_SCHEDULED_RUN_ENABLED: "false"
      ADP_ALLOW_SMTP_SEND: "false"
      ADP_ALLOW_RELEASE_UPLOAD: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Stage 1 post-migration bootstrap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/adp-stage1-bootstrap"
          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push storage migrate \
              --db "$RUNNER_TEMP/adp-stage1-bootstrap/adp.sqlite3" \
              --json \
            | tee "$RUNNER_TEMP/adp-stage1-bootstrap/storage-migrate.json"
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push migration export \
              --project-root "." \
              --db "$RUNNER_TEMP/adp-stage1-bootstrap/adp.sqlite3" \
              --output-dir "$RUNNER_TEMP/adp-stage1-bootstrap/migration-package" \
              --generated-at "$generated_at" \
              --json \
            | tee "$RUNNER_TEMP/adp-stage1-bootstrap/migration-export.json"
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push post-migration-bootstrap \
              --project-root "." \
              --migration-manifest "$RUNNER_TEMP/adp-stage1-bootstrap/migration-package/migration_manifest.json" \
              --state-dir "$RUNNER_TEMP/adp-stage1-bootstrap/state" \
              --db "$RUNNER_TEMP/adp-stage1-bootstrap/adp.sqlite3" \
              --generated-at "$generated_at" \
              --target-environment github_actions_cloud_runner \
              --workflow-path ".github/workflows/arxiv-daily-push-stage1-bootstrap.yml" \
              --require-github-actions \
              --require-network-probe \
              --json \
            | tee "$RUNNER_TEMP/adp-stage1-bootstrap/adp-stage1-bootstrap-report.json"
          python3 -m json.tool "$RUNNER_TEMP/adp-stage1-bootstrap/storage-migrate.json" >/dev/null
          python3 -m json.tool "$RUNNER_TEMP/adp-stage1-bootstrap/migration-export.json" >/dev/null
          python3 -m json.tool "$RUNNER_TEMP/adp-stage1-bootstrap/adp-stage1-bootstrap-report.json" >/dev/null

      - name: Upload Stage 1 bootstrap evidence
        uses: actions/upload-artifact@v4
        with:
          name: adp-stage1-bootstrap-report
          path: ${{ runner.temp }}/adp-stage1-bootstrap/*.json
          if-no-files-found: error
