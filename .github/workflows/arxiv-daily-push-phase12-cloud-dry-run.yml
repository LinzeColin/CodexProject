name: arXiv Daily Push live all-arXiv cloud dry-run

on:
  pull_request:
    paths:
      - ".github/workflows/arxiv-daily-push-phase12-cloud-dry-run.yml"
      - "arxiv-daily-push/**"
  workflow_dispatch:
    inputs:
      max_results_per_category:
        description: "Live arXiv Atom results per primary archive bucket."
        required: true
        default: "1"
        type: string
      polite_delay_seconds:
        description: "Delay between arXiv primary archive requests."
        required: true
        default: "3"
        type: string
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-live-all-arxiv-cloud-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-all-arxiv-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ADP_PRODUCTION_ENABLED: "false"
      ADP_SCHEDULED_RUN_ENABLED: "false"
      ADP_ALLOW_SMTP_SEND: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Resolve dry-run parameters
        id: params
        shell: bash
        run: |
          generated_at="${{ inputs.generated_at }}"
          if [ -z "$generated_at" ]; then generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; fi
          printf 'generated_at=%s\n' "$generated_at" >> "$GITHUB_OUTPUT"
          printf 'date=%s\n' "${generated_at:0:10}" >> "$GITHUB_OUTPUT"
          printf 'max_results=%s\n' "${{ inputs.max_results_per_category || '1' }}" >> "$GITHUB_OUTPUT"
          printf 'polite_delay=%s\n' "${{ inputs.polite_delay_seconds || '3' }}" >> "$GITHUB_OUTPUT"
      - name: Run live all-arXiv dry-run
        id: dry_run
        shell: bash
        run: |
          artifact_dir="$RUNNER_TEMP/adp-phase12-cloud-dry-run"
          report="$artifact_dir/adp-live-all-arxiv-dry-run.json"
          mkdir -p "$artifact_dir"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_live_all_arxiv" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push run-live-all-arxiv-dry-run --date "${{ steps.params.outputs.date }}" --generated-at "${{ steps.params.outputs.generated_at }}" --max-results-per-category "${{ steps.params.outputs.max_results }}" --polite-delay-seconds "${{ steps.params.outputs.polite_delay }}" --artifact-dir "$artifact_dir" --json > "$report"
          printf 'artifact_dir=%s\n' "$artifact_dir" >> "$GITHUB_OUTPUT"
          printf 'report=%s\n' "$report" >> "$GITHUB_OUTPUT"
      - name: Upload live all-arXiv dry-run evidence
        if: always() && steps.dry_run.outputs.artifact_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: adp-phase12-cloud-dry-run
          path: ${{ steps.dry_run.outputs.artifact_dir }}
          if-no-files-found: error
